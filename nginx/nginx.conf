# Odoo ERP Nginx Configuration
# Reverse Proxy untuk Odoo, WhatsApp Service, dan Telegram Service

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Untuk upload file besar
    client_body_timeout 300s;
    client_header_timeout 300s;
    server_tokens off;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # SSL Configuration (Aktifkan jika menggunakan HTTPS)
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;
    # ssl_session_tickets off;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=odoo_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=connection_limit:10m;

    # Upstream untuk Odoo
    upstream odoo_backend {
        server odoo:8069;
        keepalive 32;
    }

    # Upstream untuk WhatsApp Service
    upstream whatsapp_backend {
        server whatsapp-service:3000;
        keepalive 16;
    }

    # Upstream untuk Telegram Service (jika ada webhook endpoint)
    upstream telegram_backend {
        server telegram-service:8080;
        keepalive 16;
    }

    # HTTP Server (Redirect ke HTTPS jika diperlukan)
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Uncomment untuk auto-redirect ke HTTPS
        # return 301 https://$host$request_uri;

        # Odoo ERP Main Application
        location / {
            limit_req zone=odoo_limit burst=20 nodelay;
            limit_conn connection_limit 20;
            
            proxy_pass http://odoo_backend;
            proxy_redirect off;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Caching
            proxy_cache_bypass $http_upgrade;
            proxy_no_cache $http_upgrade;
            
            # Security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Static files - Long cache
        location /web/static/ {
            proxy_pass http://odoo_backend;
            proxy_cache_valid 200 90d;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            expires 90d;
            add_header Cache-Control "public, immutable";
        }

        # Web content - Short cache
        location /web/content/ {
            proxy_pass http://odoo_backend;
            proxy_cache_valid 200 7d;
            expires 7d;
        }

        # Assets - Versioned files
        location ~ ^/web/assets/ {
            proxy_pass http://odoo_backend;
            proxy_cache_valid 200 365d;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            
            proxy_pass http://odoo_backend;
            proxy_redirect off;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # API specific settings
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
        }

        # WhatsApp Service Webhook (untuk menerima callback dari WhatsApp)
        location /whatsapp/ {
            proxy_pass http://whatsapp_backend;
            proxy_redirect off;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WhatsApp webhook specific
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
            
            # WebSocket support for WhatsApp
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # WhatsApp Service Health Check
        location /whatsapp/health {
            proxy_pass http://whatsapp_backend/health;
            access_log off;
            proxy_set_header Host $host;
        }

        # Telegram Webhook (untuk menerima updates dari Telegram)
        location /telegram/ {
            proxy_pass http://telegram_backend;
            proxy_redirect off;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Longpolling (untuk notifikasi real-time Odoo)
        location /longpolling/ {
            proxy_pass http://odoo_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Long polling settings
            proxy_read_timeout 86400s;  # 24 hours
            proxy_send_timeout 86400s;
            proxy_buffering off;
            
            # WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Database Manager (Batasi akses)
        location /web/database/ {
            # Hanya izinkan dari internal network
            # allow 192.168.0.0/16;
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            deny all;
            
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Nginx status (untuk monitoring)
        location /nginx_status {
            stub_status on;
            access_log off;
            # allow 127.0.0.1;
            # deny all;
        }
    }

